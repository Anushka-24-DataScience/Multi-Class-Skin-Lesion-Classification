prepare_base_model:
  IMAGE_SIZE: [380, 380, 3]
  LEARNING_RATE: 0.001
  INCLUDE_TOP: false
  WEIGHTS: imagenet
  CLASSES: 7

data_transformation:
  IMAGE_SIZE: [380, 380]
  BATCH_SIZE: 16
  AUGMENTATION: True
training:
  EPOCHS: 50
  BATCH_SIZE: 32
  AUGMENTATION: True
  IMAGE_SIZE: [380, 380, 3]
  LEARNING_RATE: 0.0003
  FINE_TUNE_EPOCHS: 40
  FINE_TUNE_LR: 0.00003
  FINE_TUNE_LAYERS: 80

callbacks:
  EARLY_STOPPING_PATIENCE: 12
  REDUCE_LR_PATIENCE: 5
  REDUCE_LR_FACTOR: 0.5
  MIN_LR: 0.000001
