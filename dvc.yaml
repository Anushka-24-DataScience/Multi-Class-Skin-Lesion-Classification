  #   cmd: python src/DermaCancerScan/pipeline/prepare_base_model_02.py
  #   deps:
  #     - src/DermaCancerScan/components/prepare_base_model.py
  #     - src/DermaCancerScan/pipeline/prepare_base_model_02.py
  #     - src/DermaCancerScan/config/configuration.py
