stages:
  data_ingestion:
    cmd: set PYTHONPATH=src && python src/DermaCancerScan/pipeline/data_ingestion_01.py
    deps:
      - src/DermaCancerScan/pipeline/data_ingestion_01.py
      - src/DermaCancerScan/components/data_ingestion.py
      - src/DermaCancerScan/config/configuration.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion
